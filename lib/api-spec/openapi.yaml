openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: MedIntel OS API — multi-tenant medical equipment sales intelligence
servers:
  - url: /api
    description: Base API path

tags:
  - name: health
  - name: auth
  - name: facilities
  - name: signals
  - name: contacts
  - name: campaigns
  - name: sequences
  - name: drafts
  - name: batches
  - name: reports
  - name: admin
  - name: dashboard
  - name: ingestion

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Current authenticated user with account context
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Me" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ── Dashboard ────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: High-level KPI summary for the current account
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/DashboardSummary" } } } }

  /dashboard/recent-signals:
    get:
      operationId: getRecentSignals
      tags: [dashboard]
      summary: Recent purchase signals across the platform
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 20, maximum: 100 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SignalWithFacility" }

  /dashboard/top-facilities:
    get:
      operationId: getTopFacilities
      tags: [dashboard]
      summary: Top facilities by signal score
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 10, maximum: 50 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Facility" }

  # ── Facilities ───────────────────────────────────────────────
  /facilities:
    get:
      operationId: listFacilities
      tags: [facilities]
      summary: List facilities with filters
      parameters:
        - { name: state, in: query, schema: { type: string, minLength: 2, maxLength: 2 } }
        - { name: facilityType, in: query, schema: { type: string } }
        - { name: minScore, in: query, schema: { type: integer, minimum: 0, maximum: 100 } }
        - { name: search, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 50, maximum: 200 } }
        - { name: offset, in: query, schema: { type: integer, default: 0 } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/FacilityListResponse" } } } }
    post:
      operationId: createFacilityFromNpi
      tags: [facilities]
      summary: Create a new facility by NPI lookup
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FacilityNpiInput" }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Facility" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /facilities/{id}:
    get:
      operationId: getFacility
      tags: [facilities]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/FacilityDetail" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateFacility
      tags: [facilities]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FacilityUpdateInput" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Facility" } } } }

  /facilities/{id}/signals:
    get:
      operationId: getFacilitySignals
      tags: [facilities]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/PurchaseSignal" } }

  /facilities/{id}/contacts:
    get:
      operationId: getFacilityContacts
      tags: [facilities]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Contact" } }

  /facilities/{id}/equipment:
    get:
      operationId: getFacilityEquipment
      tags: [facilities]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Equipment" } }

  /facilities/sync-from-npi/{npi}:
    post:
      operationId: syncFacilityFromNpi
      tags: [ingestion]
      parameters:
        - { name: npi, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Facility" } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── Signals ──────────────────────────────────────────────────
  /signals/recompute:
    post:
      operationId: recomputeSignalScores
      tags: [signals, admin]
      summary: Recompute composite signal scores for all facilities (platform admin)
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/RecomputeResult" } } } }

  /signals/con-filings:
    get:
      operationId: listConFilings
      tags: [signals]
      summary: List recent Certificate-of-Need filings detected by the CON ingestor
      parameters:
        - { name: state, in: query, schema: { type: string, minLength: 2, maxLength: 2 } }
        - { name: status, in: query, schema: { type: string, enum: [approved, filed] } }
        - { name: limit, in: query, schema: { type: integer, default: 50, maximum: 200 } }
        - { name: offset, in: query, schema: { type: integer, default: 0 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConFilingListResponse" }

  # ── Contacts ─────────────────────────────────────────────────
  /contacts/{id}/enrich:
    post:
      operationId: enrichContact
      tags: [contacts]
      summary: Run the enrichment waterfall for a contact
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EnrichInput" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnrichResult" } } } }

  # ── Campaigns ────────────────────────────────────────────────
  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Campaign" } }
    post:
      operationId: createCampaign
      tags: [campaigns]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CampaignInput" }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Campaign" } } } }

  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CampaignDetail" } } } }
    patch:
      operationId: updateCampaign
      tags: [campaigns]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CampaignPatchInput" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Campaign" } } } }

  /campaigns/{id}/contacts:
    get:
      operationId: listCampaignContacts
      tags: [campaigns]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/CampaignContact" } }
    post:
      operationId: addCampaignContacts
      tags: [campaigns]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddContactsInput" }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/AddContactsResult" } } } }

  /campaigns/{id}/generate-drafts:
    post:
      operationId: generateCampaignDrafts
      tags: [drafts]
      summary: Generate AI outreach drafts for enrolled contacts
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "202": { description: Accepted, content: { application/json: { schema: { $ref: "#/components/schemas/GenerateDraftsResult" } } } }

  # ── Sequences ────────────────────────────────────────────────
  /sequences:
    get:
      operationId: listSequences
      tags: [sequences]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Sequence" } }
    post:
      operationId: createSequence
      tags: [sequences]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SequenceInput" }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Sequence" } } } }

  /sequences/{id}:
    get:
      operationId: getSequence
      tags: [sequences]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/SequenceDetail" } } } }

  /sequences/{id}/steps:
    post:
      operationId: addSequenceStep
      tags: [sequences]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SequenceStepInput" }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/SequenceStep" } } } }

  # ── Drafts ───────────────────────────────────────────────────
  /drafts:
    get:
      operationId: listDrafts
      tags: [drafts]
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [pending, approved, sent, skipped, rejected] } }
        - { name: limit, in: query, schema: { type: integer, default: 50, maximum: 200 } }
        - { name: offset, in: query, schema: { type: integer, default: 0 } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/DraftListResponse" } } } }

  /drafts/{id}:
    get:
      operationId: getDraft
      tags: [drafts]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Draft" } } } }
    patch:
      operationId: updateDraft
      tags: [drafts]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DraftEditInput" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Draft" } } } }

  /drafts/{id}/approve:
    post:
      operationId: approveDraft
      tags: [drafts]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Draft" } } } }

  /drafts/{id}/reject:
    post:
      operationId: rejectDraft
      tags: [drafts]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RejectDraftInput" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Draft" } } } }

  # ── Batches ──────────────────────────────────────────────────
  /batches:
    get:
      operationId: listBatches
      tags: [batches]
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 30 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/SyncBatch" } }

  /batches/{id}:
    get:
      operationId: getBatch
      tags: [batches]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SyncBatchDetail" }
        "404": { description: Not found }

  /batches/{id}/retry:
    post:
      operationId: retryBatch
      tags: [batches]
      summary: Retry only the failed sync items inside a batch
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BatchRetryResult" }
        "404": { description: Not found }

  /webhook-events:
    get:
      operationId: listWebhookEvents
      tags: [batches]
      summary: Recent inbound CRM webhook events for the current tenant (most recent first)
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 20, maximum: 100 } }
        - { name: errorsOnly, in: query, schema: { type: boolean, default: false } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/WebhookEvent" } }

  /batches/run:
    post:
      operationId: runBatches
      tags: [batches]
      summary: Manually trigger the daily batch run for all sub-accounts
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BatchRunResult" } } } }

  # ── Reports ──────────────────────────────────────────────────
  /reports/templates:
    get:
      operationId: listReportTemplates
      tags: [reports]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ReportTemplate" } }
    post:
      operationId: createReportTemplate
      tags: [reports]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReportTemplateInput" }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/ReportTemplate" } } } }

  /reports/run:
    post:
      operationId: runReport
      tags: [reports]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RunReportInput" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ReportRun" } } } }

  /reports/runs:
    get:
      operationId: listReportRuns
      tags: [reports]
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 50 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ReportRun" } }

  # ── Admin ────────────────────────────────────────────────────
  /admin/accounts:
    get:
      operationId: adminListAccounts
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Account" } }
    post:
      operationId: adminCreateAccount
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AccountInput" }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Account" } } } }

  /admin/accounts/{id}:
    patch:
      operationId: adminUpdateAccount
      tags: [admin]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AccountInput" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Account" } } } }

  /admin/sub-accounts:
    get:
      operationId: adminListSubAccounts
      tags: [admin]
      parameters:
        - { name: accountId, in: query, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/SubAccount" } }
    post:
      operationId: adminCreateSubAccount
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SubAccountInput" }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/SubAccount" } } } }

  /admin/crm-credential-schemas:
    get:
      operationId: adminListCrmCredentialSchemas
      tags: [admin]
      summary: List the credential field schema for every supported CRM
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CrmCredentialSchema" }

  /admin/sub-accounts/{id}/credentials:
    get:
      operationId: adminGetSubAccountCredentials
      tags: [admin]
      summary: Inspect stored CRM credentials (secrets are masked)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/SubAccountCredentialState" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      operationId: adminUpdateSubAccountCredentials
      tags: [admin]
      summary: Replace CRM credentials for a sub-account; encrypted at rest
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SubAccountCredentialUpdate" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/SubAccountCredentialState" } } } }
        "400": { description: Bad request, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: adminClearSubAccountCredentials
      tags: [admin]
      summary: Wipe stored CRM credentials for a sub-account
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [subAccountId, cleared]
                properties:
                  subAccountId: { type: string, format: uuid }
                  cleared: { type: boolean }
        "404": { $ref: "#/components/responses/NotFound" }

  /admin/sub-accounts/{id}/credentials/test:
    post:
      operationId: adminTestSubAccountCredentials
      tags: [admin]
      summary: Run a no-op call against the CRM to verify credentials
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CrmTestResult" } } } }
        "400": { description: Failed, content: { application/json: { schema: { $ref: "#/components/schemas/CrmTestResult" } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  /admin/sub-accounts/{id}/webhook-config:
    get:
      operationId: adminGetSubAccountWebhookConfig
      tags: [admin]
      summary: Per-CRM webhook URLs, secret status, and last-event indicator for a sub-account
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SubAccountWebhookConfig" }
        "404": { description: Not found }

  /admin/sub-accounts/{id}/webhook-secret/rotate:
    post:
      operationId: adminRotateSubAccountWebhookSecret
      tags: [admin]
      summary: Generate and store a new webhook signing secret for a sub-account; returns the plaintext exactly once
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RotateWebhookSecretResult" }
        "404": { description: Not found }

  /admin/con-filings/review-queue:
    get:
      operationId: adminListConFilingReviewQueue
      tags: [admin, signals]
      summary: List CON filings whose facility match landed in the borderline confidence band
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 50, maximum: 200 } }
        - { name: offset, in: query, schema: { type: integer, default: 0 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConFilingReviewQueueResponse" }

  /admin/con-filings/{id}/review:
    post:
      operationId: adminReviewConFiling
      tags: [admin, signals]
      summary: Confirm, reject, or reassign the auto-emitted facility match for a CON filing
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConFilingReviewInput" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
        "400": { description: Bad request, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  /admin/facilities/search:
    get:
      operationId: adminSearchFacilities
      tags: [admin]
      summary: Cross-account facility search for reassigning CON-filing matches
      parameters:
        - { name: q, in: query, required: true, schema: { type: string, minLength: 2 } }
        - { name: state, in: query, schema: { type: string, minLength: 2, maxLength: 2 } }
        - { name: limit, in: query, schema: { type: integer, default: 20, maximum: 50 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AdminFacilitySearchResult" }

  /sub-accounts/{id}/crm/connection:
    get:
      operationId: getSubAccountCrmConnection
      tags: [admin]
      summary: Whether a sub-account has CRM credentials connected (rep-accessible)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/SubAccountCrmConnection" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /sub-accounts/{id}/crm/oauth/{provider}/start:
    get:
      operationId: startSubAccountCrmOauth
      tags: [admin]
      summary: Begin a CRM OAuth flow for a sub-account; returns the authorization URL
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: provider, in: path, required: true, schema: { type: string, enum: [hubspot, salesforce] } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [authorizationUrl]
                properties:
                  authorizationUrl: { type: string }
                  redirectUri: { type: string }
        "400": { description: Bad request, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "503": { description: Provider not configured, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /sub-accounts/{id}/crm/credentials:
    delete:
      operationId: disconnectSubAccountCrm
      tags: [admin]
      summary: Wipe CRM credentials for a sub-account (rep-accessible disconnect)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [subAccountId, cleared]
                properties:
                  subAccountId: { type: string, format: uuid }
                  cleared: { type: boolean }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/User" } }

  /admin/enrichment-sources:
    get:
      operationId: adminListEnrichmentSources
      tags: [admin]
      summary: List all enrichment sources with approval and env-flag status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/EnrichmentSource" } }

  /admin/enrichment-sources/{source}/approve:
    post:
      operationId: adminApproveEnrichmentSource
      tags: [admin]
      parameters:
        - { name: source, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ApproveSourceInput" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnrichmentSource" } } } }

  /admin/enrichment-sources/{source}/revoke:
    post:
      operationId: adminRevokeEnrichmentSource
      tags: [admin]
      parameters:
        - { name: source, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnrichmentSource" } } } }

  /admin/enrichment-sources/{source}/budget:
    patch:
      operationId: adminSetEnrichmentSourceBudget
      tags: [admin]
      summary: Set or clear the monthly budget cap (in cents) for a paid enrichment source
      parameters:
        - { name: source, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetSourceBudgetInput" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnrichmentSource" } } } }

  /admin/enrichment-sources/{source}/reset-spend:
    post:
      operationId: adminResetEnrichmentSourceSpend
      tags: [admin]
      summary: Reset month-to-date spend counter for a paid enrichment source (use at the start of a new billing month)
      parameters:
        - { name: source, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EnrichmentSource" } } } }

  /admin/platform-stats:
    get:
      operationId: adminPlatformStats
      tags: [admin]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PlatformStats" } } } }

  /admin/validation-stats:
    get:
      operationId: adminValidationStats
      tags: [admin]
      summary: Per-validator counts (verified / bounced / error) over the last 30 days
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ValidatorStats" }

  /admin/encryption-key/status:
    get:
      operationId: adminEncryptionKeyStatus
      tags: [admin]
      summary: Snapshot of CRM credential encryption key state and rotation backlog
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EncryptionKeyStatus" } } } }

  /admin/encryption-key/rotate:
    post:
      operationId: adminEncryptionKeyRotate
      tags: [admin]
      summary: Re-encrypt all CRM credential blobs under the current primary key
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EncryptionKeyRotateInput" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EncryptionKeyRotateResult" } } } }

  /admin/encryption-key/rotation-log:
    get:
      operationId: adminEncryptionKeyRotationLog
      tags: [admin]
      summary: Recent CRM credential rotation audit entries
      parameters:
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 500 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CrmKeyRotationEvent" }

components:
  responses:
    Unauthorized:
      description: Unauthorized
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    NotFound:
      description: Not found
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Conflict:
      description: Conflict
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Forbidden:
      description: Forbidden
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties: { status: { type: string } }

    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }
        message: { type: string }

    Me:
      type: object
      required: [user]
      properties:
        user: { $ref: "#/components/schemas/User" }
        account: { $ref: "#/components/schemas/Account" }
        isPlatformAdmin: { type: boolean }
        subAccounts:
          type: array
          items: { $ref: "#/components/schemas/SubAccount" }

    User:
      type: object
      required: [id, email, role]
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        firstName: { type: string, nullable: true }
        lastName: { type: string, nullable: true }
        role: { type: string }
        accountId: { type: string, format: uuid, nullable: true }
        isActive: { type: boolean }
        clerkUserId: { type: string, nullable: true }

    Account:
      type: object
      required: [id, name, slug]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        planTier: { type: string }
        defaultCrm: { type: string }
        batchLimitDaily: { type: integer }
        status: { type: string }
        subAccountCount: { type: integer }
        createdAt: { type: string, format: date-time }

    AccountInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        planTier: { type: string }
        defaultCrm: { type: string }
        status: { type: string }

    SubAccount:
      type: object
      required: [id, accountId, name]
      properties:
        id: { type: string, format: uuid }
        accountId: { type: string, format: uuid }
        name: { type: string }
        crmType: { type: string, nullable: true }
        batchSizeDaily: { type: integer }
        repName: { type: string, nullable: true }
        repEmail: { type: string, nullable: true }
        timezone: { type: string }
        isActive: { type: boolean }

    CrmCredentialField:
      type: object
      required: [key, label, required, secret]
      properties:
        key: { type: string }
        label: { type: string }
        required: { type: boolean }
        secret: { type: boolean }
        placeholder: { type: string }
        helpText: { type: string }

    CrmCredentialSchema:
      type: object
      required: [crmType, fields]
      properties:
        crmType: { type: string }
        fields:
          type: array
          items: { $ref: "#/components/schemas/CrmCredentialField" }

    SubAccountCredentialFieldState:
      type: object
      required: [present]
      properties:
        present: { type: boolean }
        value: { type: string, nullable: true }

    SubAccountCredentialState:
      type: object
      required: [subAccountId, encrypted, adapterAvailable, schema, fields]
      properties:
        subAccountId: { type: string, format: uuid }
        crmType: { type: string, nullable: true }
        encrypted: { type: boolean }
        adapterAvailable: { type: boolean }
        schema:
          type: array
          items: { $ref: "#/components/schemas/CrmCredentialField" }
        fields:
          type: object
          additionalProperties: { $ref: "#/components/schemas/SubAccountCredentialFieldState" }

    SubAccountCredentialUpdate:
      type: object
      required: [credentials]
      properties:
        crmType: { type: string }
        credentials:
          type: object
          additionalProperties: true

    CrmTestResult:
      type: object
      required: [ok, message]
      properties:
        ok: { type: boolean }
        message: { type: string }
        details:
          type: object
          additionalProperties: true

    SubAccountCrmConnection:
      type: object
      required: [subAccountId, connected, providers]
      properties:
        subAccountId: { type: string, format: uuid }
        crmType: { type: string, nullable: true }
        connected: { type: boolean }
        callbackUri: { type: string, nullable: true }
        providers:
          type: array
          items:
            type: object
            required: [provider, configured]
            properties:
              provider: { type: string, enum: [hubspot, salesforce] }
              configured: { type: boolean }

    SubAccountInput:
      type: object
      required: [accountId, name]
      properties:
        accountId: { type: string, format: uuid }
        name: { type: string }
        crmType: { type: string }
        batchSizeDaily: { type: integer }
        repName: { type: string }
        repEmail: { type: string }
        timezone: { type: string }

    Facility:
      type: object
      required: [id, npi, name, facilityType]
      properties:
        id: { type: string, format: uuid }
        npi: { type: string }
        name: { type: string }
        facilityType: { type: string }
        beds: { type: integer, nullable: true }
        ownership: { type: string, nullable: true }
        systemName: { type: string, nullable: true }
        address1: { type: string, nullable: true }
        city: { type: string, nullable: true }
        state: { type: string, nullable: true }
        zip: { type: string, nullable: true }
        website: { type: string, nullable: true }
        cahDesignation: { type: boolean, nullable: true }
        teachingHospital: { type: boolean, nullable: true }
        signalScore: { type: integer }
        contactCount: { type: integer }
        signalCount: { type: integer }
        lastEnrichedAt: { type: string, format: date-time, nullable: true }

    FacilityListResponse:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Facility" }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    FacilityDetail:
      allOf:
        - $ref: "#/components/schemas/Facility"
        - type: object
          properties:
            signals: { type: array, items: { $ref: "#/components/schemas/PurchaseSignal" } }
            equipment: { type: array, items: { $ref: "#/components/schemas/Equipment" } }
            contacts: { type: array, items: { $ref: "#/components/schemas/Contact" } }
            financials: { type: array, items: { type: object, additionalProperties: true } }

    FacilityNpiInput:
      type: object
      required: [npi]
      properties: { npi: { type: string, minLength: 10, maxLength: 10 } }

    FacilityUpdateInput:
      type: object
      properties:
        name: { type: string }
        beds: { type: integer }
        website: { type: string }
        ownership: { type: string }
        systemName: { type: string }

    PurchaseSignal:
      type: object
      required: [id, facilityId, signalType, source]
      properties:
        id: { type: string, format: uuid }
        facilityId: { type: string, format: uuid }
        signalType: { type: string }
        signalValue: { type: string, nullable: true }
        confidence: { type: integer }
        source: { type: string }
        detectedAt: { type: string, format: date-time }
        isActive: { type: boolean }

    SignalWithFacility:
      allOf:
        - $ref: "#/components/schemas/PurchaseSignal"
        - type: object
          properties:
            facilityName: { type: string }
            facilityState: { type: string, nullable: true }

    ConFiling:
      type: object
      required: [id, state, facilityAccessible]
      properties:
        id: { type: string, format: uuid }
        facilityId: { type: string, format: uuid, nullable: true }
        facilityName: { type: string, nullable: true }
        facilityAccessible: { type: boolean, description: "True when the matched facility belongs to the current account and the detail page is reachable." }
        state: { type: string }
        filingDate: { type: string, format: date, nullable: true }
        decisionDate: { type: string, format: date, nullable: true }
        equipmentType: { type: string, nullable: true }
        modality: { type: string, nullable: true }
        requestedAmount: { type: integer, nullable: true }
        approvedAmount: { type: integer, nullable: true }
        status: { type: string, nullable: true, description: "Raw status text as published by the source regulator." }
        statusNormalized: { type: string, nullable: true, enum: [approved, filed], description: "Normalized binary status for filtering and badges; null when source status is unknown." }
        applicantName: { type: string, nullable: true }
        filingUrl: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        matchScore: { type: number, nullable: true, description: "Confidence in [0,1] from the fuzzy facility matcher. 1 for exact NPI hits, null when unmatched." }
        matchField: { type: string, nullable: true, enum: [name, dba, system, npi], description: "Facility column that carried the auto-match. Null when unmatched." }
        reviewStatus: { type: string, nullable: true, enum: [auto_approved, needs_review, confirmed, rejected, reassigned], description: "Human-review state of the auto-emitted match." }
        createdAt: { type: string, format: date-time, nullable: true }

    ConFilingReviewItem:
      type: object
      required: [id, state, applicantName, matchScore, matchField, reviewStatus]
      properties:
        id: { type: string, format: uuid }
        facilityId: { type: string, format: uuid, nullable: true }
        facilityName: { type: string, nullable: true }
        facilitySystem: { type: string, nullable: true }
        facilityCity: { type: string, nullable: true }
        facilityState: { type: string, nullable: true }
        state: { type: string }
        applicantName: { type: string, nullable: true }
        filingDate: { type: string, format: date, nullable: true }
        filingUrl: { type: string, nullable: true }
        modality: { type: string, nullable: true }
        equipmentType: { type: string, nullable: true }
        status: { type: string, nullable: true }
        matchScore: { type: number, nullable: true }
        matchField: { type: string, nullable: true }
        reviewStatus: { type: string, nullable: true }
        createdAt: { type: string, format: date-time, nullable: true }

    ConFilingReviewQueueResponse:
      type: object
      required: [data, total, reviewThreshold]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/ConFilingReviewItem" }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }
        reviewThreshold: { type: number, description: "Score below which auto-matches are flagged for human review." }

    ConFilingReviewInput:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [confirm, reject, reassign]
        facilityId:
          type: string
          format: uuid
          description: Required when action is `reassign`; the facility to swap the match to.
        notes:
          type: string
          description: Optional reviewer note (<= 1000 chars).

    AdminFacilitySearchResult:
      type: object
      required: [id, name]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        doingBusinessAs: { type: string, nullable: true }
        systemName: { type: string, nullable: true }
        city: { type: string, nullable: true }
        state: { type: string, nullable: true }
        npi: { type: string, nullable: true }

    ConFilingListResponse:
      type: object
      required: [data, total, states]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/ConFiling" }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }
        states:
          type: array
          description: Distinct state codes present in the con_filings table, for populating the state filter UI.
          items: { type: string }

    Contact:
      type: object
      required: [id, facilityId]
      properties:
        id: { type: string, format: uuid }
        facilityId: { type: string, format: uuid }
        firstName: { type: string, nullable: true }
        lastName: { type: string, nullable: true }
        title: { type: string, nullable: true }
        department: { type: string, nullable: true }
        email: { type: string, nullable: true }
        emailStatus: { type: string }
        phone: { type: string, nullable: true }
        linkedinUrl: { type: string, nullable: true }
        confidenceScore: { type: integer }
        buyingAuthorityScore: { type: integer }
        lastEnrichedAt: { type: string, format: date-time, nullable: true }
        lastValidation:
          nullable: true
          type: object
          required: [source, result, checkedAt]
          properties:
            source: { type: string, description: "Validator that produced the most recent verdict (e.g. zerobounce, bouncer)" }
            result: { type: string, description: "Verdict recorded by that validator (verified, bounced, error, ok, unknown)" }
            checkedAt: { type: string, format: date-time }

    Equipment:
      type: object
      required: [id, facilityId, modality]
      properties:
        id: { type: string, format: uuid }
        facilityId: { type: string, format: uuid }
        modality: { type: string }
        manufacturer: { type: string, nullable: true }
        model: { type: string, nullable: true }
        installYear: { type: integer, nullable: true }
        pctDepreciated: { type: number, nullable: true }
        urgencyTier: { type: string, nullable: true }
        estReplacementYear: { type: integer, nullable: true }

    DashboardSummary:
      type: object
      properties:
        totalFacilities: { type: integer }
        totalContacts: { type: integer }
        verifiedContacts: { type: integer }
        activeSignals: { type: integer }
        pendingDrafts: { type: integer }
        approvedDrafts: { type: integer }
        batchesToday: { type: integer }
        myCampaigns: { type: integer }
        avgSignalScore: { type: number }
        signalsByType: { type: array, items: { type: object, properties: { signalType: { type: string }, count: { type: integer } } } }
        sentCount: { type: integer, description: "Drafts synced to a CRM in the last 30 days" }
        openedCount: { type: integer }
        repliedCount: { type: integer }
        bouncedCount: { type: integer }
        replyRate: { type: number, description: "repliedCount / sentCount * 100, last 30 days" }
        bounceRate: { type: number }

    EnrichInput:
      type: object
      properties:
        dryRun: { type: boolean, default: false }

    EnrichResult:
      type: object
      properties:
        contactId: { type: string, format: uuid }
        sourcesRun: { type: array, items: { type: string } }
        sourcesSkipped: { type: array, items: { type: object, additionalProperties: true } }
        confidenceBefore: { type: integer }
        confidenceAfter: { type: integer }

    Campaign:
      type: object
      required: [id, name, accountId, subAccountId, status]
      properties:
        id: { type: string, format: uuid }
        accountId: { type: string, format: uuid }
        subAccountId: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        filterCriteria: { type: object, additionalProperties: true }
        status: { type: string }
        batchSizeDaily: { type: integer }
        contactCount: { type: integer }
        draftsPending: { type: integer }
        startDate: { type: string, nullable: true }
        endDate: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    CampaignDetail:
      allOf:
        - $ref: "#/components/schemas/Campaign"
        - type: object
          properties:
            sequences: { type: array, items: { $ref: "#/components/schemas/Sequence" } }

    CampaignInput:
      type: object
      required: [name, subAccountId]
      properties:
        name: { type: string }
        subAccountId: { type: string, format: uuid }
        description: { type: string }
        filterCriteria: { type: object, additionalProperties: true }
        status: { type: string }
        batchSizeDaily: { type: integer }

    CampaignPatchInput:
      type: object
      properties:
        name: { type: string }
        description: { type: string, nullable: true }
        filterCriteria: { type: object, additionalProperties: true }
        status: { type: string }
        batchSizeDaily: { type: integer }

    CampaignContact:
      type: object
      required: [id, campaignId, contactId, status]
      properties:
        id: { type: string, format: uuid }
        campaignId: { type: string, format: uuid }
        contactId: { type: string, format: uuid }
        status: { type: string }
        score: { type: integer }
        contact: { $ref: "#/components/schemas/Contact" }
        facility: { $ref: "#/components/schemas/Facility" }
        enrolledAt: { type: string, format: date-time, nullable: true }

    AddContactsInput:
      type: object
      required: [contactIds]
      properties:
        contactIds: { type: array, items: { type: string, format: uuid } }
        sequenceId: { type: string, format: uuid }

    AddContactsResult:
      type: object
      properties:
        added: { type: integer }
        skipped: { type: integer }

    GenerateDraftsResult:
      type: object
      properties:
        queued: { type: integer }
        generated: { type: integer }
        skipped: { type: integer }

    Sequence:
      type: object
      required: [id, name, accountId]
      properties:
        id: { type: string, format: uuid }
        accountId: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        channel: { type: string }
        totalSteps: { type: integer }
        isAiGenerated: { type: boolean }
        isActive: { type: boolean }

    SequenceDetail:
      allOf:
        - $ref: "#/components/schemas/Sequence"
        - type: object
          properties:
            steps: { type: array, items: { $ref: "#/components/schemas/SequenceStep" } }

    SequenceInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }
        channel: { type: string }
        campaignId: { type: string, format: uuid }

    SequenceStep:
      type: object
      required: [id, sequenceId, stepNum]
      properties:
        id: { type: string, format: uuid }
        sequenceId: { type: string, format: uuid }
        stepNum: { type: integer }
        channel: { type: string }
        delayDays: { type: integer }
        subjectLine: { type: string, nullable: true }
        bodyTemplate: { type: string, nullable: true }
        linkedinNote: { type: string, nullable: true }
        linkedinMessage: { type: string, nullable: true }
        variant: { type: string }

    SequenceStepInput:
      type: object
      required: [stepNum]
      properties:
        stepNum: { type: integer }
        channel: { type: string }
        delayDays: { type: integer }
        subjectLine: { type: string }
        bodyTemplate: { type: string }
        linkedinNote: { type: string }
        linkedinMessage: { type: string }
        variant: { type: string }

    Draft:
      type: object
      required: [id, accountId, contactId, facilityId, body, status]
      properties:
        id: { type: string, format: uuid }
        accountId: { type: string, format: uuid }
        contactId: { type: string, format: uuid }
        facilityId: { type: string, format: uuid }
        channel: { type: string }
        subject: { type: string, nullable: true }
        body: { type: string }
        linkedinNote: { type: string, nullable: true }
        linkedinMessage: { type: string, nullable: true }
        personalizationApplied: { type: object, additionalProperties: true }
        status: { type: string }
        rejectionReason: { type: string, nullable: true }
        contact: { $ref: "#/components/schemas/Contact" }
        facility: { $ref: "#/components/schemas/Facility" }
        generatedAt: { type: string, format: date-time }
        crmSyncedAt: { type: string, format: date-time, nullable: true }
        openedAt: { type: string, format: date-time, nullable: true }
        repliedAt: { type: string, format: date-time, nullable: true }
        bouncedAt: { type: string, format: date-time, nullable: true }
        aiClassification:
          type: string
          nullable: true
          description: Latest AI classification of the most recent reply received for this draft.
          enum:
            - interested
            - not_interested
            - objection
            - out_of_office
            - unsubscribe
            - wrong_person
            - unknown

    DraftListResponse:
      type: object
      required: [data, total]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/Draft" } }
        total: { type: integer }

    DraftEditInput:
      type: object
      properties:
        subject: { type: string }
        body: { type: string }
        linkedinNote: { type: string }
        linkedinMessage: { type: string }
        editReason: { type: string }

    RejectDraftInput:
      type: object
      properties:
        reason: { type: string }

    SyncBatch:
      type: object
      required: [id, accountId, batchDate, status]
      properties:
        id: { type: string, format: uuid }
        accountId: { type: string, format: uuid }
        subAccountId: { type: string, format: uuid }
        crmType: { type: string }
        batchDate: { type: string }
        status: { type: string }
        targetCount: { type: integer }
        pushedCount: { type: integer }
        failedCount: { type: integer }
        startedAt: { type: string, format: date-time, nullable: true }
        completedAt: { type: string, format: date-time, nullable: true }
        errorLog:
          type: array
          nullable: true
          items: { type: object, additionalProperties: true }

    SyncItem:
      type: object
      required: [id, batchId, localId, status]
      properties:
        id: { type: string, format: uuid }
        batchId: { type: string, format: uuid }
        accountId: { type: string, format: uuid }
        entityType: { type: string, nullable: true }
        localId: { type: string, format: uuid }
        crmId: { type: string, nullable: true }
        crmType: { type: string, nullable: true }
        status: { type: string }
        errorMessage: { type: string, nullable: true }
        crmResponse: { type: object, nullable: true, additionalProperties: true }
        pushedAt: { type: string, format: date-time, nullable: true }
        retryCount: { type: integer, nullable: true }

    SyncBatchDetail:
      type: object
      required: [batch, items]
      properties:
        batch: { $ref: "#/components/schemas/SyncBatch" }
        items: { type: array, items: { $ref: "#/components/schemas/SyncItem" } }

    BatchRetryResult:
      type: object
      properties:
        retried: { type: integer }
        pushed: { type: integer }
        failed: { type: integer }

    WebhookEvent:
      type: object
      required: [id, accountId, eventType, receivedAt]
      properties:
        id: { type: string, format: uuid }
        accountId: { type: string, format: uuid }
        draftId: { type: string, format: uuid, nullable: true }
        crmType: { type: string, nullable: true }
        crmContactId: { type: string, nullable: true }
        eventType: { type: string }
        rawPayload: { type: object, additionalProperties: true, nullable: true }
        receivedAt: { type: string, format: date-time }

    BatchRunResult:
      type: object
      properties:
        totalPushed: { type: integer }
        totalFailed: { type: integer }
        batches: { type: array, items: { $ref: "#/components/schemas/SyncBatch" } }

    ReportTemplate:
      type: object
      required: [id, name, dataSources]
      properties:
        id: { type: string, format: uuid }
        accountId: { type: string, format: uuid, nullable: true }
        name: { type: string }
        description: { type: string, nullable: true }
        category: { type: string, nullable: true }
        dataSources: { type: array, items: { type: string } }
        fieldConfig: { type: array, items: { type: object, additionalProperties: true } }
        filterConfig: { type: array, items: { type: object, additionalProperties: true } }
        vizType: { type: string }
        isSystemTemplate: { type: boolean }
        isActive: { type: boolean }

    ReportTemplateInput:
      type: object
      required: [name, dataSources]
      properties:
        name: { type: string }
        description: { type: string }
        category: { type: string }
        dataSources: { type: array, items: { type: string } }
        fieldConfig: { type: array, items: { type: object, additionalProperties: true } }
        filterConfig: { type: array, items: { type: object, additionalProperties: true } }
        vizType: { type: string }

    RunReportInput:
      type: object
      required: [templateId]
      properties:
        templateId: { type: string, format: uuid }
        runtimeFilters: { type: object, additionalProperties: true }

    ReportRun:
      type: object
      required: [id, templateId, accountId, status]
      properties:
        id: { type: string, format: uuid }
        templateId: { type: string, format: uuid }
        accountId: { type: string, format: uuid }
        triggeredBy: { type: string }
        runtimeFilters: { type: object, additionalProperties: true }
        status: { type: string }
        rowCount: { type: integer, nullable: true }
        durationMs: { type: integer, nullable: true }
        errorMessage: { type: string, nullable: true }
        rows: { type: array, items: { type: object, additionalProperties: true } }
        queuedAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time, nullable: true }

    EnrichmentSource:
      type: object
      required: [source, approved, isFreeSource, monthSpendCents]
      properties:
        source: { type: string }
        approved: { type: boolean }
        notes: { type: string, nullable: true }
        monthBudgetCents: { type: integer, nullable: true, description: "Monthly cap in cents (null = no cap)" }
        monthSpendCents: { type: integer, description: "Month-to-date spend in cents" }
        approvedAt: { type: string, format: date-time, nullable: true }
        approvedBy: { type: string, nullable: true }
        envEnabled: { type: boolean }
        envKeyPresent: { type: boolean }
        isFreeSource: { type: boolean }
        autoPaused:
          type: boolean
          description: "True when the source is currently skipped because month-to-date spend has hit the configured monthly cap."

    ApproveSourceInput:
      type: object
      properties:
        notes: { type: string }
        monthlyBudgetLimit: { type: integer }

    SubAccountWebhookConfig:
      type: object
      required: [subAccountId, subAccountName, webhookUrls, secretSet]
      properties:
        subAccountId: { type: string, format: uuid }
        subAccountName: { type: string }
        crmType: { type: string, nullable: true }
        webhookUrls:
          type: array
          items:
            type: object
            required: [crm, url]
            properties:
              crm: { type: string }
              url: { type: string }
        secretSet: { type: boolean }
        lastReceivedAt: { type: string, format: date-time, nullable: true }
        lastEventType: { type: string, nullable: true }
        lastSignatureOk: { type: boolean, nullable: true }
        lastErrorReason: { type: string, nullable: true }
        lastErrorAt: { type: string, format: date-time, nullable: true }

    RotateWebhookSecretResult:
      type: object
      required: [webhookSecret]
      properties:
        webhookSecret: { type: string }
        rotatedAt: { type: string, format: date-time }

    SetSourceBudgetInput:
      type: object
      properties:
        monthBudgetCents:
          type: integer
          nullable: true
          description: "Monthly cap in cents. Pass null to clear the cap."

    PlatformStats:
      type: object
      properties:
        totalFacilities: { type: integer }
        totalContacts: { type: integer }
        verifiedContacts: { type: integer }
        activeAccounts: { type: integer }
        pendingDrafts: { type: integer }
        activeSignals: { type: integer }
        batchesToday: { type: integer }

    ValidatorStats:
      type: object
      required: [source, verified, bounced, error, other, total]
      properties:
        source: { type: string }
        verified: { type: integer }
        bounced: { type: integer }
        error: { type: integer }
        other: { type: integer, description: "Other verdicts (ok / unknown)" }
        total: { type: integer }

    RecomputeResult:
      type: object
      properties:
        updated: { type: integer }

    EncryptionKeyStatus:
      type: object
      required:
        - primaryKid
        - previousKeyConfigured
        - totalSubAccounts
        - encryptedCount
        - needsRotationCount
        - plaintextCount
        - emptyCount
      properties:
        primaryKid: { type: string, description: "Short fingerprint of the current CRM_ENCRYPTION_KEY." }
        previousKid: { type: string, nullable: true, description: "Short fingerprint of CRM_ENCRYPTION_KEY_PREVIOUS, if configured." }
        previousKeyConfigured: { type: boolean }
        totalSubAccounts: { type: integer }
        encryptedCount: { type: integer }
        needsRotationCount: { type: integer, description: "Encrypted blobs not yet under the current primary key." }
        plaintextCount: { type: integer, description: "Legacy unencrypted credential rows. Re-save them via the credentials editor to migrate." }
        emptyCount: { type: integer }
        lastRunAt: { type: string, format: date-time, nullable: true }
        lastRunId: { type: string, format: uuid, nullable: true }

    EncryptionKeyRotateInput:
      type: object
      properties:
        dryRun:
          type: boolean
          description: "If true, do not write new encrypted blobs but still record audit log entries marked as dryRun."

    EncryptionKeyRotateFailure:
      type: object
      required: [subAccountId, error]
      properties:
        subAccountId: { type: string, format: uuid }
        error: { type: string }

    EncryptionKeyRotateResult:
      type: object
      required:
        - runId
        - dryRun
        - primaryKid
        - totalScanned
        - reEncrypted
        - alreadyCurrent
        - skippedPlaintext
        - failed
        - failures
      properties:
        runId: { type: string, format: uuid }
        dryRun: { type: boolean }
        primaryKid: { type: string }
        previousKid: { type: string, nullable: true }
        totalScanned: { type: integer }
        reEncrypted: { type: integer }
        alreadyCurrent: { type: integer }
        skippedPlaintext: { type: integer }
        failed: { type: integer }
        failures:
          type: array
          items: { $ref: "#/components/schemas/EncryptionKeyRotateFailure" }

    CrmKeyRotationEvent:
      type: object
      required: [id, runId, status]
      properties:
        id: { type: string, format: uuid }
        runId: { type: string, format: uuid }
        subAccountId: { type: string, format: uuid, nullable: true }
        status: { type: string, description: "re_encrypted | already_current | skipped_plaintext | failed" }
        fromKid: { type: string, nullable: true }
        toKid: { type: string, nullable: true }
        decryptedWithPrevious: { type: boolean, nullable: true }
        dryRun: { type: boolean, nullable: true }
        errorMessage: { type: string, nullable: true }
        performedBy: { type: string, format: uuid, nullable: true }
        createdAt: { type: string, format: date-time, nullable: true }
